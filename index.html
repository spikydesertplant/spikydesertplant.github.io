<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="favicon.png">
	<title>Build a car for no treasure</title>
	<style>
		html,
		body {
			background-color: black;
			margin: 0;
			padding: 0;
			overflow: hidden;
			overscroll-behavior: none;
		}
	</style>
</head>

<body>
	<main></main>

	<!-- ONLINE LINKS -->
	<script src="https://q5js.org/q5.js"></script>
	<script src="https://p5play.org/v3/planck.min.js"></script>
	<script src="https://p5play.org/v3/p5play.js"></script>

	<!-- OFFLINE LINKS -->
	
	<!-- <script src="node_modules/q5/q5.js"></script>
	<script src="node_modules/p5play/planck.min.js"></script>
	<script src="node_modules/p5play/p5play.js"></script> -->
	

	<!-- YOUR SKETCH -->
	<script>
		let ground;
let boxes; 
let wheels; 
let firstSprite = null;
let isFrozen = false; 

function setup() {
  new Canvas();
  world.gravity.y = 10;

  document.oncontextmenu = (e) => e.preventDefault();

  ground = new Sprite(400, 550, 1e5, 60, 'static');
  ground.color = 'gray';

  boxes = new Group();
  wheels = new Group(); 
}

function draw() {
  background(240);

  for (let w of wheels) {
    if (!isFrozen) {
      w.rotationSpeed = 5; 
    } else {
      w.rotationSpeed = 0; 
    }
  }

  if (mouse.presses('right')) {
    let box = new boxes.Sprite(mouse.x, mouse.y, 40, 40);
    box.color = 'black';
    box.friction = 0.5;
  }

  if (kb.presses('c')) {
    let wheel = new wheels.Sprite(mouse.x, mouse.y, 40);
    wheel.color = 'white';
    wheel.friction = 9999; 
  }

  let allInteractive = [...boxes, ...wheels];
  for (let s of allInteractive) {
    if (s.mouse.hovering() && mouse.presses('left')) {
      if (!firstSprite) {
        firstSprite = s;
        firstSprite.stroke = 'red'; 
        firstSprite.strokeWeight = 4;
      } else if (firstSprite === s) {
        resetSelection();
      } else {

        let distBetween = dist(firstSprite.x, firstSprite.y, s.x, s.y);
        let centerX = (firstSprite.x + s.x) / 2;
        let centerY = (firstSprite.y + s.y) / 2;
        
        let link = new Sprite(centerX, centerY, distBetween, 2); 
        link.color = 'blue'; 
        link.stroke = 'blue';
        link.collideConnected = false;
        
        link.overlaps(boxes);
        link.overlaps(wheels);
        link.overlaps(ground);

      
        let jointA = new HingeJoint(firstSprite, link);
        jointA.collideConnected = false;
        
        let jointB = new HingeJoint(s, link);
        jointB.collideConnected = false;

        jointA.offsetB.x = -distBetween / 2;
        jointB.offsetB.x = distBetween / 2;

        resetSelection();
      }
      break; 
    }
  }

  if (firstSprite) {
    if (kb.presses('s')) {
      firstSprite.color = 'blue';
      firstSprite.friction = 0.01;
      resetSelection();
    }
    if (kb.presses('a')) {
      firstSprite.color = wheels.includes(firstSprite) ? 'white' : 'black';
      firstSprite.friction = wheels.includes(firstSprite) ? 9999 : 0.5;
      resetSelection();
    }
  }

  for (let s of [...boxes, ...wheels]) {
    if (s.y > 1000 || s.y < -1000) {
      if (firstSprite === s) firstSprite = null;
      s.remove();
    }
  }

  if (mouse.presses('left') && !boxes.mouse.hovering() && !wheels.mouse.hovering()) {
    resetSelection();
  }

  if ((kb.presses('delete') || kb.presses('backspace')) && firstSprite) {
    firstSprite.remove();
    firstSprite = null;
  }

  if (kb.presses('r')) {
    boxes.removeAll(); 
    wheels.removeAll();
    allSprites.forEach(s => {
      if (s.color === 'blue' && s !== ground) s.remove();
    });
    resetSelection();
  }

  if (kb.presses('space')) {
    isFrozen = !isFrozen;
    world.timeScale = isFrozen ? 0 : 1;
  }

  updateCamera();

  camera.off();
  if (isFrozen) {
    fill('red');
    textSize(20);
    text("ПАУЗА (world.timeScale = 0)", 20, 30);
  }
  camera.on();
}

function updateCamera() {
  let minX = 0;
  let maxX = 800;
  let minY = ground.y - ground.h / 2;
  let maxY = ground.y + ground.h / 2;

  let allObjects = [...boxes, ...wheels];
  if (allObjects.length > 0) {
    for (let s of allObjects) {
      if (s.x - s.w < minX) minX = s.x - s.w;
      if (s.x + s.w > maxX) maxX = s.x + s.w;
      if (s.y - s.h < minY) minY = s.y - s.h;
      if (s.y + s.h > maxY) maxY = s.y + s.h;
    }
  }

  let padding = 100;
  let sceneWidth = (maxX - minX) + padding * 2;
  let sceneHeight = (maxY - minY) + padding * 2;

  let targetX = (minX + maxX) / 2;
  let targetY = (minY + maxY) / 2;

  let zoomX = width / sceneWidth;
  let zoomY = height / sceneHeight;
  
  let targetZoom = min(zoomX, zoomY);
  if (targetZoom > 1) targetZoom = 1; 

  camera.x = lerp(camera.x, targetX, 0.1);
  camera.y = lerp(camera.y, targetY, 0.1);
  camera.zoom = lerp(camera.zoom, targetZoom, 0.1);
}

function resetSelection() {
  if (firstSprite) {
    firstSprite.stroke = 'black';
    firstSprite.strokeWeight = 1;
    firstSprite = null;
  }
}

	</script>
</body>

</html>
